<!doctype html>
<html lang="en">

</head>

<body>
    <!-- navbar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container">
            <a class="navbar-brand" href="index.html">Store-App</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="product.html">Product</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About</a>
                    </li>
                </ul>
                <!-- tombol login -->
                <div class="d-flex">
                    <a href="#" class="btn btn-outline-danger">Login</a>
                </div>
            </div>
        </div>
    </nav>
    <!-- end navbar -->

    <!-- hero section -->
    <section class="text-center text-white d-flex align-items-center justify-content-center" style="background: url('image/hero.jpg') center/cover no-repeat; height: 80vh;">
        <div>
            <h1 class="fw-bold">Discover Your Style</h1>
            <a href="#" class="btn btn-danger btn-lg mt-2">Shop Now</a>
        </div>
    </section>
    <!-- end hero section -->

    <!-- section products -->
    <section class="py-5">
        <div class="container text-center">
            <h2 class="fw-bold text-danger">Our Best Sellers</h2>
            <div class="row mt-4 justify-content-center">
                <div class="col-md-3">
                    <div class="card" style="width: 18rem;">
                        <img src="image/baju.jpg" class="card-img-top" alt="Baju Kaos Hitam Polos">
                        <div class="card-body">
                            <h5 class="card-title">Baju Kaos Hitam Polos</h5>
                            <p class="text-muted mb-1">Baju</p>
                            <p class="fw-bold text-success">Rp 100.000</p>
                            <a href="#" class="btn btn-outline-danger">Buy Now</a>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card" style="width: 18rem;">
                        <img src="image/celana.jpg" class="card-img-top" alt="Celana Jeans Biru">
                        <div class="card-body">
                            <h5 class="card-title">Celana Jeans Biru</h5>
                            <p class="text-muted mb-1">Celana</p>
                            <p class="fw-bold text-success">Rp 150.000</p>
                            <a href="#" class="btn btn-outline-danger">Buy Now</a>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card" style="width: 18rem;">
                        <img src="image/sepatu.jpg" class="card-img-top" alt="Sepatu Sneakers Putih">
                        <div class="card-body">
                            <h5 class="card-title">Sepatu Sneakers Putih</h5>
                            <p class="text-muted mb-1">Sepatu</p>
                            <p class="fw-bold text-success">Rp 200.000</p>
                            <a href="#" class="btn btn-outline-danger">Buy Now</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    <!-- end section products -->

    <!-- footer -->
    <footer class="bg-danger text-white text-center py-3">
        <p class="mb-0">&copy; 2026 Store-App. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
